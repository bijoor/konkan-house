<text x="892.0" y="6772.989898989899" text-anchor="middle" font-size="18" font-weight="600" fill="#222">TILE ROOFING — Procured (Nuvocotto Invoice #12, 27-Apr-2026)</text>
<text x="70" y="6814.989898989899" font-size="14" font-weight="600" fill="#222">Roof surface area (measured on the slope face)</text>
<text x="70" y="6836.989898989899" font-size="12" fill="#333">   Main slope (trapezoid): ½·(52' + 21')·19' 7" = 715 sft × 2 faces = 1431 sft</text>
<text x="70" y="6852.989898989899" font-size="12" fill="#333">   Hip end   (triangle):  ½·34' 10"·14' 4" = 249 sft × 2 faces = 499 sft</text>
<text x="70" y="6872.989898989899" font-size="12" font-weight="600" fill="#222">   Total roof surface = 2060 sft   |   with 10% waste allowance = 2266 sft</text>
<text x="70" y="6984.989898989899" font-size="14" font-weight="600" fill="#222">Items procured — for the contractor to reconcile against site delivery</text>
<line x1="60" y1="7006.989898989899" x2="1724" y2="7006.989898989899" stroke="#333" stroke-width="1"/>
<text x="70" y="7022.989898989899" font-size="12" font-weight="600" fill="#222">Item</text>
<text x="340" y="7022.989898989899" font-size="12" font-weight="600" fill="#222">Tile size</text>
<text x="490" y="7022.989898989899" font-size="12" font-weight="600" fill="#222">Qty (Nos)</text>
<text x="580" y="7022.989898989899" font-size="12" font-weight="600" fill="#222">Rate (₹)</text>
<text x="690" y="7022.989898989899" font-size="12" font-weight="600" fill="#222">Amount (₹)</text>
<text x="830" y="7022.989898989899" font-size="12" font-weight="600" fill="#222">Notes</text>
<line x1="60" y1="7028.989898989899" x2="1724" y2="7028.989898989899" stroke="#333" stroke-width="1"/>
<text x="70" y="7044.989898989899" font-size="12" fill="#333">Indicotto rooftile 16×10</text>
<text x="340" y="7044.989898989899" font-size="12" fill="#333">406 × 254 mm</text>
<text x="490" y="7044.989898989899" font-size="12" fill="#333">4,150</text>
<text x="580" y="7044.989898989899" font-size="12" fill="#333">48.50</text>
<text x="690" y="7044.989898989899" font-size="12" fill="#333">201,275.00</text>
<text x="830" y="7044.989898989899" font-size="12" fill="#333">main pantile — 1.33 tiles/sft</text>
<text x="70" y="7066.989898989899" font-size="12" fill="#333">Ceiling Tile 12×8 (Nutical Plain)</text>
<text x="340" y="7066.989898989899" font-size="12" fill="#333">305 × 203 mm</text>
<text x="490" y="7066.989898989899" font-size="12" fill="#333">4,700</text>
<text x="580" y="7066.989898989899" font-size="12" fill="#333">30.00</text>
<text x="690" y="7066.989898989899" font-size="12" fill="#333">141,000.00</text>
<text x="830" y="7066.989898989899" font-size="12" fill="#333">flat under-ceiling — 1.5 tiles/sft</text>
<text x="70" y="7088.989898989899" font-size="12" fill="#333">Ridge tiles</text>
<text x="340" y="7088.989898989899" font-size="12" fill="#333">per 1 running ft</text>
<text x="490" y="7088.989898989899" font-size="12" fill="#333">100</text>
<text x="580" y="7088.989898989899" font-size="12" fill="#333">70.00</text>
<text x="690" y="7088.989898989899" font-size="12" fill="#333">7,000.00</text>
<text x="830" y="7088.989898989899" font-size="12" fill="#333">central ridge + 4 hip diagonals</text>
<text x="70" y="7110.989898989899" font-size="12" fill="#333">Semi glass tile 16×10</text>
<text x="340" y="7110.989898989899" font-size="12" fill="#333">406 × 254 mm</text>
<text x="490" y="7110.989898989899" font-size="12" fill="#333">12</text>
<text x="580" y="7110.989898989899" font-size="12" fill="#333">220.00</text>
<text x="690" y="7110.989898989899" font-size="12" fill="#333">2,640.00</text>
<text x="830" y="7110.989898989899" font-size="12" fill="#333">specialty — small qty for details</text>
<line x1="60" y1="7126.989898989899" x2="1724" y2="7126.989898989899" stroke="#333" stroke-width="1"/>
<text x="580" y="7138.989898989899" font-size="12" fill="#333" >Sub-total (8,962 items):</text>
<text x="800" y="7138.989898989899" font-size="12" fill="#333" text-anchor="end" >₹ 351,915.00</text>
<text x="580" y="7156.989898989899" font-size="12" fill="#333" >Delivery charges:</text>
<text x="800" y="7156.989898989899" font-size="12" fill="#333" text-anchor="end" >₹ 70,000.00</text>
<text x="580" y="7174.989898989899" font-size="12" fill="#333" >IGST @ 12%:</text>
<text x="800" y="7174.989898989899" font-size="12" fill="#333" text-anchor="end" >₹ 50,629.80</text>
<text x="580" y="7192.989898989899" font-size="12" fill="#333" font-weight="600">GRAND TOTAL:</text>
<text x="800" y="7192.989898989899" font-size="12" fill="#333" text-anchor="end" font-weight="600">₹ 472,544.80</text>
<text x="70" y="7224.989898989899" font-size="14" font-weight="600" fill="#222">Design cross-check &amp; contractor notes</text>
<text x="70" y="7244.989898989899" font-size="12" fill="#b00" font-weight="600">ASSUMPTIONS (per Quote #92-2585, 15-Apr-2026):</text>
<text x="70" y="7259.989898989899" font-size="12" fill="#333">• Indicotto rooftile: 16" × 10" (406 × 254 mm), 1.33 tiles/sft.</text>
<text x="70" y="7274.989898989899" font-size="12" fill="#333">  16" tile − 4" (100 mm) overlap = 12" purlin OC.</text>
<text x="70" y="7289.989898989899" font-size="12" fill="#333">• Ceiling Tile 12×8 (Nutical Plain): 12" × 8" (305 × 203 mm),</text>
<text x="70" y="7304.989898989899" font-size="12" fill="#333">  1.5 tiles/sft. 12" dim spans purlin-centre to purlin-centre.</text>
<text x="70" y="7319.989898989899" font-size="12" fill="#333">• Ridge tiles: sold per 1 running foot of ridge.</text>
<text x="70" y="7334.989898989899" font-size="12" fill="#333"></text>
<text x="70" y="7349.989898989899" font-size="12" fill="#333">• Indicotto: 2060 sft × 1.33 × 10% waste = 3,014. Ordered 4,150 → +1,136 (+38% margin).</text>
<text x="70" y="7364.989898989899" font-size="12" fill="#333">• Ceiling: 2060 sft × 1.5 × 10% waste = 3,400. Ordered 4,700 → +1,300 (+38% margin).</text>
<text x="70" y="7379.989898989899" font-size="12" fill="#333">• Ridge: 21' central + 4 × 27' 11" hips = 122 ft;</text>
<text x="70" y="7394.989898989899" font-size="12" fill="#b00" font-weight="600">   +10% waste = 134 ft. Ordered 100 ft → -34 (-25% SHORT).</text>
<text x="70" y="7409.989898989899" font-size="12" fill="#333"></text>
<text x="70" y="7424.989898989899" font-size="12" fill="#b00" font-weight="600">ACTION — order 34 additional running feet of ridge cap:</text>
<text x="70" y="7439.989898989899" font-size="12" fill="#b00" font-weight="600">   34 × ₹70.00 = ₹2,380.00;  with 12% IGST ≈ ₹2,665.60.</text>
<text x="70" y="7454.989898989899" font-size="12" fill="#333"></text>
<text x="70" y="7469.989898989899" font-size="12" fill="#333">• Order was originally sized for the earlier two-face gable design,</text>
<text x="70" y="7484.989898989899" font-size="12" fill="#333">  which had a longer central ridge but no hip ridges. Moving to hip</text>
<text x="70" y="7499.989898989899" font-size="12" fill="#333">  shortened the central ridge (55'→15') but added 4 hip ridges of</text>
<text x="70" y="7514.989898989899" font-size="12" fill="#333">  ~26' each. The 100 ft order is short by that delta.</text>
<text x="70" y="7529.989898989899" font-size="12" fill="#333">• Tile margins (+1,136 (+38% margin), +1,300 (+38% margin)) also stem from the</text>
<text x="70" y="7544.989898989899" font-size="12" fill="#333">  earlier larger gable surface. Confirm with contractor whether the</text>
<text x="70" y="7559.989898989899" font-size="12" fill="#333">  surplus is for outbuildings or should be treated as excess.</text>
<text x="932.0" y="7244.989898989899" font-size="12" fill="#b00" font-weight="600">CONSTRUCTION DETAILS (per Santosh Roofing video):</text>
<text x="932.0" y="7259.989898989899" font-size="12" fill="#333">• RIDGE: sealed with Top Flex UV tape, then ridge tiles laid without</text>
<text x="932.0" y="7274.989898989899" font-size="12" fill="#333">  cement mortar — the sealed tape holds them and stays watertight.</text>
<text x="932.0" y="7289.989898989899" font-size="12" fill="#333">• VALLEY: 3" gap held between the two tile fields (straight-line cut).</text>
<text x="932.0" y="7304.989898989899" font-size="12" fill="#333">  Metal strip + cement seal the gap and channel water down; paint to match.</text>
<text x="932.0" y="7319.989898989899" font-size="12" fill="#333">• BARGE: sealed with cement mortar for clean, waterproof edges.</text>
<text x="932.0" y="7334.989898989899" font-size="12" fill="#333">• WALL JUNCTIONS: self-adhesive easy-flash ~5" up the wall and 5" onto</text>
<text x="932.0" y="7349.989898989899" font-size="12" fill="#333">  the tile; silicone bead along the top edge of the flashing.</text>
<text x="932.0" y="7364.989898989899" font-size="12" fill="#333">  Silicone at every gap around pipe penetrations.</text>
<text x="932.0" y="7379.989898989899" font-size="12" fill="#333">• WATER CHANNELS: brackets sit in the gap above the Pani Patti, PVC</text>
<text x="932.0" y="7394.989898989899" font-size="12" fill="#333">  channels drop into the brackets, downpipe carries water to ground.</text>
<text x="932.0" y="7409.989898989899" font-size="12" fill="#333"></text>
<text x="932.0" y="7424.989898989899" font-size="12" fill="#b00" font-weight="600">SITE RULES:</text>
<text x="932.0" y="7439.989898989899" font-size="12" fill="#333">• NEVER step between two ceiling tiles — the tile has low strength on</text>
<text x="932.0" y="7454.989898989899" font-size="12" fill="#333">  its own and will crack; step only where a purlin is underneath.</text>
<text x="932.0" y="7469.989898989899" font-size="12" fill="#333">• Check every ceiling tile for cracks BEFORE the membrane goes on —</text>
<text x="932.0" y="7484.989898989899" font-size="12" fill="#333">  a broken tile is hard to reach once membrane + top tile are down.</text>
<text x="932.0" y="7499.989898989899" font-size="12" fill="#333">• Anchor bolts embedded 6–8" into footing; deeper footing = more stability.</text>
<text x="932.0" y="7514.989898989899" font-size="12" fill="#333">• Column base plate welded onto the projecting rebar (2" projection)</text>
<text x="932.0" y="7529.989898989899" font-size="12" fill="#333">  for a permanent, non-pull-out joint.</text>
<text x="932.0" y="7544.989898989899" font-size="12" fill="#333">• Flood-test the whole roof at the end for leaks. Do NOT walk on wet</text>
<text x="932.0" y="7559.989898989899" font-size="12" fill="#333">  tiles — they are extremely slippery when wet.</text>
<text x="932.0" y="7574.989898989899" font-size="12" fill="#333"></text>
<text x="932.0" y="7589.989898989899" font-size="12" fill="#333">• Roof pitch: main slopes 27.4°, hip ends 39.1° (both above 20° min).</text>
<text x="932.0" y="7604.989898989899" font-size="12" fill="#333">• Hip-end pitch is shallow for Konkan monsoon intensity. Give flashing</text>
<text x="932.0" y="7619.989898989899" font-size="12" fill="#333">  and underlay at the four hip ridges extra attention.</text>
</svg>
