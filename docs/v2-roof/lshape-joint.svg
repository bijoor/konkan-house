<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" width="620" height="480">
  <title>Multi-segment L-shape — leaves and joints</title>
  <rect width="620" height="480" fill="#f8fafc"/>
  <text x="310" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1e293b">Multi-segment L-shape — leaves (▲) vs joints (◆)</text>
  <text x="310" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4b5563">Segment A: N-S wing.  Segment B: W-E wing.  Shared point = joint.</text>

  <!-- Wall footprint (union polygon of segment rectangles) -->
  <path
    d="M 100,70 L 340,70 L 340,240 L 540,240 L 540,410 L 100,410 Z"
    fill="none" stroke="#c19a6b" stroke-width="5"/>

  <!-- Wait that's wrong. Let me redo. Segment A rect x=[100,340] y=[70,340]; Segment B rect x=[220,540] y=[240,410]. Union:  -->

  <!-- SEG A rectangle (light blue tint) -->
  <rect x="100" y="70" width="240" height="270" fill="#bae6fd" fill-opacity="0.35" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- SEG B rectangle (light green tint) -->
  <rect x="220" y="240" width="320" height="170" fill="#bbf7d0" fill-opacity="0.35" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Segment A centreline (ridge) -->
  <line x1="220" y1="70" x2="220" y2="340" stroke="#dc2626" stroke-width="2.5"/>
  <text x="182" y="140" font-family="sans-serif" font-size="11" fill="#0284c7">SEG A</text>
  <text x="182" y="155" font-family="sans-serif" font-size="9" fill="#4b5563">x=[100,340], y=[70,340]</text>

  <!-- Segment B centreline (ridge) -->
  <line x1="220" y1="325" x2="540" y2="325" stroke="#dc2626" stroke-width="2.5"/>
  <text x="450" y="285" font-family="sans-serif" font-size="11" fill="#16a34a">SEG B</text>
  <text x="450" y="298" font-family="sans-serif" font-size="9" fill="#4b5563">x=[220,540], y=[240,410]</text>

  <!-- LEAF endpoints (triangles) -->
  <!-- A.start = (220, 70) — leaf at top of L -->
  <polygon points="220,58 226,78 214,78" fill="#22c55e" stroke="#14532d" stroke-width="1.5"/>
  <text x="232" y="66" font-family="sans-serif" font-size="11" font-weight="600" fill="#14532d">A.start ▲ LEAF</text>
  <text x="232" y="78" font-family="sans-serif" font-size="9" fill="#065f46">pick open/closed independently</text>

  <!-- B.end = (540, 325) — leaf at right of L -->
  <polygon points="552,325 532,331 532,319" fill="#22c55e" stroke="#14532d" stroke-width="1.5"/>
  <text x="440" y="345" font-family="sans-serif" font-size="11" font-weight="600" fill="#14532d">B.end ▲ LEAF</text>
  <text x="405" y="357" font-family="sans-serif" font-size="9" fill="#065f46">pick open/closed independently</text>

  <!-- JOINT — where A.end = B.start = (220, 325) -->
  <polygon points="220,313 232,325 220,337 208,325" fill="#f59e0b" stroke="#78350f" stroke-width="1.5"/>
  <text x="80" y="255" font-family="sans-serif" font-size="11" font-weight="600" fill="#78350f">A.end = B.start</text>
  <text x="80" y="268" font-family="sans-serif" font-size="11" font-weight="700" fill="#78350f">◆ JOINT (auto)</text>
  <line x1="150" y1="270" x2="212" y2="322" stroke="#78350f" stroke-width="0.7"/>

  <!-- Inside corner (where valley would land) -->
  <circle cx="340" cy="240" r="5" fill="#2563eb" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="350" y="230" font-family="sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">inside corner</text>
  <text x="350" y="242" font-family="sans-serif" font-size="9" fill="#1e40af">valley base at wall_top_z</text>

  <!-- Valley line (from joint apex down to inside corner) -->
  <line x1="220" y1="325" x2="340" y2="240" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <g transform="translate(50, 440)">
    <polygon points="0,0 6,-12 -6,-12" fill="#22c55e" stroke="#14532d" stroke-width="1"/>
    <text x="12" y="-3" font-family="sans-serif" font-size="10" fill="#334155">LEAF — leaf endpoint (per-segment style picker)</text>
    <polygon points="200,-6 208,0 200,6 192,0" fill="#f59e0b" stroke="#78350f" stroke-width="1" transform="translate(-30 0)"/>
    <text x="185" y="-3" font-family="sans-serif" font-size="10" fill="#334155">JOINT — shared endpoint (auto-resolved to valley/hip)</text>
    <line x1="410" y1="-6" x2="440" y2="-6" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="445" y="-3" font-family="sans-serif" font-size="10" fill="#334155">valley line at joint</text>
  </g>
</svg>
