<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <title>Segment endpoints are wall midpoints, not wall corners</title>
  <rect width="500" height="400" fill="#f8fafc"/>
  <text x="250" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1e293b">Endpoints sit at wall MIDPOINTS, not wall corners</text>

  <!-- Wall rectangle -->
  <rect x="130" y="60" width="240" height="280" fill="none" stroke="#c19a6b" stroke-width="6"/>
  <text x="360" y="200" font-family="sans-serif" font-size="10" fill="#78350f">walls</text>

  <!-- Wall corners (grey dots — NOT the segment endpoints) -->
  <circle cx="130" cy="60"  r="4" fill="#9ca3af"/>
  <circle cx="370" cy="60"  r="4" fill="#9ca3af"/>
  <circle cx="130" cy="340" r="4" fill="#9ca3af"/>
  <circle cx="370" cy="340" r="4" fill="#9ca3af"/>

  <!-- Segment centreline (red ridge) -->
  <line x1="250" y1="60" x2="250" y2="340" stroke="#dc2626" stroke-width="2.5"/>

  <!-- Segment endpoints — where the ridge meets each end wall -->
  <circle cx="250" cy="60"  r="7" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
  <circle cx="250" cy="340" r="7" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="255" y="52" font-family="sans-serif" font-size="11" font-weight="600" fill="#dc2626">seg.start (mid-N-wall)</text>
  <text x="255" y="355" font-family="sans-serif" font-size="11" font-weight="600" fill="#dc2626">seg.end   (mid-S-wall)</text>
  <text x="90"  y="55" font-family="sans-serif" font-size="10" fill="#6b7280">wall corner ≠ endpoint</text>

  <!-- Half-width brackets -->
  <line x1="130" y1="200" x2="245" y2="200" stroke="#334155" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="255" y1="200" x2="370" y2="200" stroke="#334155" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="185" y="195" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#334155">width / 2</text>
  <text x="315" y="195" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#334155">width / 2</text>
</svg>
