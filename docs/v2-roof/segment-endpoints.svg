<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <title>V2 roof segment — endpoints and rectangle</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="500" height="400" fill="#f8fafc"/>
  <text x="250" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1e293b">A single roof segment</text>

  <!-- Segment rectangle (width × length) -->
  <rect x="130" y="60" width="240" height="280" fill="#bae6fd" fill-opacity="0.35" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="250" y="52" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0284c7">segment rectangle (width × length)</text>

  <!-- Centreline (ridge) -->
  <line x1="250" y1="60" x2="250" y2="340" stroke="#dc2626" stroke-width="2.5"/>
  <text x="260" y="200" font-family="sans-serif" font-size="11" fill="#dc2626">centreline (ridge)</text>

  <!-- Endpoints -->
  <circle cx="250" cy="60" r="6" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
  <circle cx="250" cy="340" r="6" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="260" y="65" font-family="sans-serif" font-size="12" font-weight="600" fill="#dc2626">seg.start = [x0, y0]</text>
  <text x="260" y="345" font-family="sans-serif" font-size="12" font-weight="600" fill="#dc2626">seg.end   = [x1, y1]</text>

  <!-- Width arrows -->
  <line x1="130" y1="380" x2="370" y2="380" stroke="#334155" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="250" y="395" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#334155">width (perpendicular)</text>

  <!-- Length arrow -->
  <line x1="90" y1="60" x2="90" y2="340" stroke="#334155" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="30" y="200" font-family="sans-serif" font-size="10" fill="#334155">length (along)</text>
</svg>
